name: inferopt

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: inferopt-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - inferopt-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inferopt-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - FASTAPI_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - inferopt-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inferopt-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - inferopt-net

networks:
  inferopt-net:
    driver: bridge
